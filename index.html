<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 适配手机端，防止缩放变形 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 | 木乔的OC主页</title>
  <!-- 引入外部CSS样式文件，统一全站风格 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 页面主体居中容器 -->
  <div class="container">
    <!-- 首页介绍卡片 -->
    <div class="card">
      <h1>木乔的OC主页</h1>
      <p>把脑海里的细节温柔慢慢拼凑，留住每段独属于他们的故事。</p>
    </div>

    <!-- 角色档案入口模块 -->
    <div class="card">
      <h2>前往角色档案</h2>
      <p>点击下方按钮，输入密码查看角色档案</p>
      <div class="btn-group">
        <button class="oc-btn" onclick="checkPassword('Kyon.html')">Kyon</button>
        <button class="oc-btn" onclick="checkPassword('kaolu.html')">烤炉先生</button>
      </div>
    </div>

    <!-- 故事文章入口模块 -->
    <div class="card">
      <h2>记录他们的故事</h2>
      <p>在这里写下属于Kyon与烤炉先生的文字与心意</p>
      <div class="btn-group">
        <button class="oc-btn" onclick="checkPassword('article.html')">文章阅读</button>
      </div>
    </div>
  </div>

  <!-- 页脚版权信息 -->
  <footer>Original Character | 木乔的私人OC世界</footer>

  <!-- 密码验证JS脚本 -->
  <script>
    // 密码配置区，可自行修改对应页面的密码
    const pwd_kyon = "Kyon";    // Kyon.html 页面密码
    const pwd_kaolu = "烤炉";   // kaolu.html 页面密码
    const pwd_wenzhang = "文章";// article.html 页面密码

    // 密码验证核心函数
    function checkPassword(page) {
      let pwd;       // 对应页面的正确密码
      let title;     // 弹窗提示的标题

      // 根据跳转页面匹配对应密码和标题
      if (page === "Kyon.html") {
        pwd = pwd_kyon;
        title = "Kyon 档案";
      } else if (page === "kaolu.html") {
        pwd = pwd_kaolu;
        title = "烤炉先生";
      } else if (page === "article.html") {
        pwd = pwd_wenzhang;
        title = "他们的故事";
      }

      // 弹出密码输入框
      let input = prompt("请输入【" + title + "】密码: ");
      // 密码正确则跳转页面，错误则弹出提示
      if (input === pwd) {
        window.location.href = page;
      } else {
        alert("密码错误，请重试");
      }
    }
  </script>
</body>
</html>
