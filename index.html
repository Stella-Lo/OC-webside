<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 | 木乔的OC世界</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="pageTitle" style="
  position: fixed;top: 20px;left: 25px;margin: 0;
  font-size: 2.2rem;font-weight: 600;z-index: 9999;
  color: var(--color-text-title);
">首页 | 木乔的OC世界</h1>

<!-- 统一切换按钮 -->
<button class="theme-toggle-btn" id="themeToggle">切换深色模式</button>

<div class="container" style="margin-top: 120px;">
  <div class="card">
    <h2>前往角色档案</h2>
    <p>点击下方按钮，输入密码查看角色档案</p>
    <div class="btn-group">
      <button class="oc-btn" onclick="checkPassword('Kyon.html')">Kyon🐱</button>
      <button class="oc-btn" onclick="checkPassword('kaolu.html')">烤炉先生🐰</button>
    </div>
    <span class="corner-cat">🐱</span>
    <span class="corner-rabbit">🐰</span>
  </div>

  <div class="card">
    <h2>记录他们的故事</h2>
    <p>在这里写下属于Kyon与烤炉先生的文字与心意</p>
    <div class="btn-group">
      <button class="oc-btn" onclick="checkPassword('article.html')">文章阅读📃</button>
    </div>
    <span class="corner-cat">🐱</span>
    <span class="corner-rabbit">🐰</span>
  </div>
</div>

<footer>Original Character | 木乔的私人OC世界</footer>

<script>
// 密码验证（完全保留你的原有功能）
const pwd_kyon = "Kyon", pwd_kaolu = "烤炉", pwd_wenzhang = "文章";
function checkPassword(page) {
  let pwd, title;
  if(page==="Kyon.html"){pwd=pwd_kyon;title="Kyon 档案"}
  else if(page==="kaolu.html"){pwd=pwd_kaolu;title="烤炉先生"}
  else if(page==="article.html"){pwd=pwd_wenzhang;title="他们的故事"}
  let input=prompt("请输入【"+title+"】密码: ");
  input===pwd?window.location.href=page:alert("我就知道你不知道嘿");
}
</script>

<!-- 通用主题切换JS -->
<script>
const themeToggle = document.getElementById('themeToggle');
const body = document.body;
const savedTheme = localStorage.getItem('ocTheme');
if(savedTheme==='dark'){body.classList.add('dark-mode');themeToggle.textContent='切换浅色模式'}
themeToggle.addEventListener('click',()=>{
  body.classList.toggle('dark-mode');
  body.classList.contains('dark-mode')?(themeToggle.textContent='切换浅色模式',localStorage.setItem('ocTheme','dark')):(themeToggle.textContent='切换深色模式',localStorage.setItem('ocTheme','light'))
});
</script>
</body>
</html>
