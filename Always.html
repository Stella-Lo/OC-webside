<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Always | 木乔的OC世界</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 深浅色切换按钮（全站统一迷你款） -->
  <button class="theme-toggle-btn" id="themeToggle">切换深色模式</button>

  <div class="container">
    <!-- 恢复原有卡片结构 -->
    <div class="card">
      <h2>Always</h2>
      <p>某个小企划，但是不知道会不会写下去呢
      </p>
      <hr style="margin:16px 0;opacity:0.2;">

      <!-- 文章内容（自动换行） -->
      <div id="articleContent" style="line-height: 1.8; white-space: pre-wrap;">
        这是一个小企划，名字叫做Always，主要是写一些短篇的故事，可能会有一些关联，但不一定会有主线。<br>
        目前已经有了几个故事的构思，但还没有开始写作，所以也不知道会不会写下去。<br>
        如果有兴趣的话，可以关注一下这个企划，看看有没有什么新的故事出来。<br>
        也欢迎大家提出一些建议或者想法，让这个企划更加丰富多彩！<br>
      </div>

      <!-- 两个按钮：返回目录 + 返回主页 -->
      <div class="btn-group" style="margin-top: 30px;">
        <button class="oc-btn" onclick="location.href='article.html'">返回目录</button>
        <button class="oc-btn" onclick="location.href='index.html'">返回主页</button>
      </div>
    </div>
  </div>

  <footer>Original Character | 木乔的私人OC世界</footer>

  <!-- 全站通用主题切换JS -->
  <script>
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    const savedTheme = localStorage.getItem('ocTheme');

    if (savedTheme === 'dark') {
      body.classList.add('dark-mode');
      themeToggle.textContent = '切换浅色模式';
    }

    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark-mode');
      if (body.classList.contains('dark-mode')) {
        themeToggle.textContent = '切换浅色模式';
        localStorage.setItem('ocTheme', 'dark');
      } else {
        themeToggle.textContent = '切换深色模式';
        localStorage.setItem('ocTheme', 'light');
      }
    });
  </script>
</body>

</html>
